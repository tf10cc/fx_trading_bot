<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BacktestEngine × カセット 仕組み図</title>
<style>
  body { background:#111; color:#ccc; font-family:sans-serif; padding:40px; margin:0; font-size:16px; }
  h2 { color:#90caf9; font-size:22px; border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:30px; }
  h3 { color:#ffcc80; font-size:18px; margin-top:40px; margin-bottom:16px; }
  .section { background:#1a1a2e; border-radius:10px; padding:30px; margin-bottom:40px; }
  .note { color:#888; font-size:14px; margin-bottom:20px; }
  .point { background:#2a1a0a; border-left:4px solid #ff9800; padding:14px 18px; border-radius:4px;
           color:#ffcc80; font-size:15px; margin-top:20px; line-height:1.7; }
</style>
</head>
<body>

<h2>BacktestEngine × カセット　仕組み図</h2>

<!-- ===== STEP 1 ===== -->
<div class="section">
  <h3>STEP 1　df（テーブル）を作る</h3>
  <p class="note">CSVを読み込んで、SMA・平均足・色・実体を計算してカラムを追加する。<strong style="color:#ffcc80">df はここで完成し、以降は読み取り専用（エンジンもカセットも書き換えない）</strong></p>

  <svg viewBox="0 0 800 340" width="100%" style="font-family:sans-serif">

    <!-- CSV -->
    <rect x="10" y="10" width="180" height="60" rx="6" fill="#2a1a3a" stroke="#9c27b0" stroke-width="2"/>
    <text x="100" y="36" fill="#ce93d8" font-size="15" text-anchor="middle" font-weight="bold">CSV ファイル</text>
    <text x="100" y="56" fill="#aaa" font-size="12" text-anchor="middle">time/open/high/low/close</text>

    <!-- 矢印 -->
    <line x1="190" y1="40" x2="225" y2="40" stroke="#555" stroke-width="2"/>
    <polygon points="228,40 220,36 220,44" fill="#555"/>

    <!-- SMA計算 -->
    <rect x="230" y="10" width="130" height="60" rx="6" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
    <text x="295" y="36" fill="#90caf9" font-size="14" text-anchor="middle" font-weight="bold">SMA 計算</text>
    <text x="295" y="55" fill="#90caf9" font-size="13" text-anchor="middle">sma を追加</text>

    <!-- 矢印 -->
    <line x1="360" y1="40" x2="395" y2="40" stroke="#555" stroke-width="2"/>
    <polygon points="398,40 390,36 390,44" fill="#555"/>

    <!-- 平均足計算 -->
    <rect x="400" y="10" width="160" height="60" rx="6" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
    <text x="480" y="32" fill="#90caf9" font-size="14" text-anchor="middle" font-weight="bold">平均足計算</text>
    <text x="480" y="50" fill="#aaa" font-size="12" text-anchor="middle">ha_open/close</text>
    <text x="480" y="63" fill="#aaa" font-size="12" text-anchor="middle">ha_high/low</text>

    <!-- 矢印 -->
    <line x1="560" y1="40" x2="595" y2="40" stroke="#555" stroke-width="2"/>
    <polygon points="598,40 590,36 590,44" fill="#555"/>

    <!-- 色・実体 -->
    <rect x="600" y="10" width="180" height="60" rx="6" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
    <text x="690" y="32" fill="#90caf9" font-size="14" text-anchor="middle" font-weight="bold">色・実体計算</text>
    <text x="690" y="50" fill="#aaa" font-size="12" text-anchor="middle">ha_color（1/-1）</text>
    <text x="690" y="63" fill="#aaa" font-size="12" text-anchor="middle">ha_body_top/bottom</text>

    <!-- df完成ボックス -->
    <rect x="200" y="120" width="400" height="200" rx="8" fill="#1b3a1b" stroke="#4caf50" stroke-width="2"/>
    <text x="400" y="148" fill="#a5d6a7" font-size="16" text-anchor="middle" font-weight="bold">df（完成）</text>

    <!-- df テーブルヘッダー -->
    <rect x="215" y="158" width="370" height="28" rx="3" fill="#2a4a2a"/>
    <text x="250" y="177" fill="#90caf9" font-size="12" font-weight="bold">idx</text>
    <text x="310" y="177" fill="#90caf9" font-size="12" font-weight="bold">time</text>
    <text x="400" y="177" fill="#90caf9" font-size="12" font-weight="bold">sma</text>
    <text x="460" y="177" fill="#90caf9" font-size="12" font-weight="bold">ha_color</text>
    <text x="540" y="177" fill="#90caf9" font-size="12" font-weight="bold">ha_body_top</text>

    <!-- df 行 -->
    <text x="250" y="202" fill="#aaa" font-size="13" text-anchor="middle">0</text>
    <text x="310" y="202" fill="#aaa" font-size="13">3/1 00:00</text>
    <text x="400" y="202" fill="#aaa" font-size="13" text-anchor="middle">2830</text>
    <text x="470" y="202" fill="#4caf50" font-size="13" text-anchor="middle">1（青）</text>
    <text x="555" y="202" fill="#aaa" font-size="13" text-anchor="middle">2856</text>

    <text x="250" y="222" fill="#aaa" font-size="13" text-anchor="middle">1</text>
    <text x="310" y="222" fill="#aaa" font-size="13">3/1 01:00</text>
    <text x="400" y="222" fill="#aaa" font-size="13" text-anchor="middle">2831</text>
    <text x="470" y="222" fill="#ef5350" font-size="13" text-anchor="middle">-1（赤）</text>
    <text x="555" y="222" fill="#aaa" font-size="13" text-anchor="middle">2858</text>

    <text x="250" y="242" fill="#777" font-size="13" text-anchor="middle">...</text>
    <text x="400" y="242" fill="#777" font-size="13" text-anchor="middle">...</text>
    <text x="470" y="242" fill="#777" font-size="13" text-anchor="middle">...</text>

    <text x="250" y="265" fill="#aaa" font-size="13" text-anchor="middle">N</text>
    <text x="310" y="265" fill="#aaa" font-size="13">最新の足</text>
    <text x="400" y="265" fill="#aaa" font-size="13" text-anchor="middle">2845</text>
    <text x="470" y="265" fill="#4caf50" font-size="13" text-anchor="middle">1（青）</text>
    <text x="555" y="265" fill="#aaa" font-size="13" text-anchor="middle">2870</text>

    <!-- 矢印: 上段 → df完成 -->
    <line x1="100" y1="70" x2="100" y2="100" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="100" y1="100" x2="400" y2="100" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="400" y1="100" x2="400" y2="118" stroke="#4caf50" stroke-width="2"/>
    <polygon points="400,121 395,111 405,111" fill="#4caf50"/>
  </svg>
</div>


<!-- ===== STEP 2 ===== -->
<div class="section">
  <h3>STEP 2　idx=0 から最後まで1本ずつループ</h3>
  <p class="note">BacktestEngine が各行に対して、カセットに「エントリーする？」「決済する？」と聞いて回る</p>

  <svg viewBox="0 0 1100 720" width="100%" style="font-family:sans-serif">

    <!-- ループ開始 -->
    <rect x="290" y="10" width="220" height="50" rx="25" fill="#2a1a0a" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="41" fill="#ffcc80" font-size="15" text-anchor="middle" font-weight="bold">idx = 0, 1, 2 ... とループ</text>

    <line x1="400" y1="60" x2="400" y2="90" stroke="#555" stroke-width="2"/>
    <polygon points="400,93 395,83 405,83" fill="#555"/>

    <!-- 決済チェックひし形 -->
    <polygon points="400,93 530,150 400,207 270,150" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
    <text x="400" y="143" fill="#eee" font-size="14" text-anchor="middle">今ポジションを</text>
    <text x="400" y="163" fill="#eee" font-size="14" text-anchor="middle">持っているか？</text>

    <!-- NO矢印（右） -->
    <line x1="530" y1="150" x2="760" y2="150" stroke="#ef5350" stroke-width="2"/>
    <polygon points="763,150 753,145 753,155" fill="#ef5350"/>
    <text x="640" y="143" fill="#ef5350" font-size="13" text-anchor="middle">NO</text>

    <!-- YES矢印（下） -->
    <line x1="400" y1="207" x2="400" y2="240" stroke="#4caf50" stroke-width="2"/>
    <polygon points="400,243 395,233 405,233" fill="#4caf50"/>
    <text x="413" y="230" fill="#4caf50" font-size="13">YES</text>

    <!-- カセット決済呼び出し -->
    <rect x="180" y="243" width="440" height="68" rx="6" fill="#0d1a2a" stroke="#2196f3" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="400" y="268" fill="#90caf9" font-size="14" text-anchor="middle" font-weight="bold">カセットを呼ぶ</text>
    <text x="400" y="288" fill="#90caf9" font-size="13" text-anchor="middle">cassette.check_long_exit(df, idx)</text>
    <text x="400" y="303" fill="#aaa" font-size="12" text-anchor="middle">または check_short_exit(df, idx)</text>

    <line x1="400" y1="311" x2="400" y2="343" stroke="#555" stroke-width="2"/>
    <polygon points="400,346 395,336 405,336" fill="#555"/>

    <!-- True/False分岐ひし形 -->
    <polygon points="400,346 500,388 400,430 300,388" fill="#1a2a3a" stroke="#555" stroke-width="1.5"/>
    <text x="400" y="393" fill="#eee" font-size="14" text-anchor="middle">True？</text>

    <!-- YES矢印（下）→ 決済実行 -->
    <line x1="400" y1="430" x2="400" y2="463" stroke="#4caf50" stroke-width="2"/>
    <polygon points="400,466 395,456 405,456" fill="#4caf50"/>
    <text x="413" y="453" fill="#4caf50" font-size="13">YES</text>

    <!-- 決済実行ボックス -->
    <rect x="180" y="466" width="440" height="65" rx="6" fill="#3a1a1a" stroke="#ef5350" stroke-width="2"/>
    <text x="400" y="487" fill="#ef9a9a" font-size="15" text-anchor="middle" font-weight="bold">取引履歴リストに決済を記録</text>
    <text x="400" y="507" fill="#aaa" font-size="13" text-anchor="middle">決済価格 = df['open'].iloc[idx+1]</text>
    <text x="400" y="522" fill="#555" font-size="12" text-anchor="middle">（df は変更しない）</text>

    <!-- NO矢印（右）→ 何もしない -->
    <line x1="500" y1="388" x2="590" y2="388" stroke="#555" stroke-width="2"/>
    <polygon points="593,388 583,383 583,393" fill="#555"/>
    <text x="540" y="381" fill="#555" font-size="13">NO</text>
    <rect x="593" y="370" width="130" height="36" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="658" y="393" fill="#555" font-size="13" text-anchor="middle">何もしない</text>

    <!-- ===右側：エントリーチェック=== -->

    <!-- エントリーチェックボックス -->
    <rect x="763" y="113" width="240" height="75" rx="6" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
    <text x="883" y="140" fill="#eee" font-size="14" text-anchor="middle" font-weight="bold">エントリーチェック</text>
    <text x="883" y="160" fill="#aaa" font-size="12" text-anchor="middle">ポジションなし？</text>
    <text x="883" y="178" fill="#555" font-size="11" text-anchor="middle">（またはさっき決済した）</text>

    <line x1="883" y1="188" x2="883" y2="218" stroke="#555" stroke-width="2"/>
    <polygon points="883,221 878,211 888,211" fill="#555"/>

    <!-- カセットエントリー呼び出し -->
    <rect x="758" y="221" width="250" height="88" rx="6" fill="#0d1a2a" stroke="#2196f3" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="883" y="246" fill="#90caf9" font-size="13" text-anchor="middle" font-weight="bold">カセットを呼ぶ</text>
    <text x="883" y="266" fill="#90caf9" font-size="12" text-anchor="middle">check_long_entry(df, idx)</text>
    <text x="883" y="284" fill="#90caf9" font-size="12" text-anchor="middle">check_short_entry(df, idx)</text>
    <text x="883" y="300" fill="#aaa" font-size="11" text-anchor="middle">→ True/False を返す</text>

    <line x1="883" y1="309" x2="883" y2="341" stroke="#555" stroke-width="2"/>
    <polygon points="883,344 878,334 888,334" fill="#555"/>

    <!-- エントリー実行ボックス -->
    <rect x="758" y="344" width="250" height="82" rx="6" fill="#1b3a1b" stroke="#4caf50" stroke-width="2"/>
    <text x="883" y="367" fill="#a5d6a7" font-size="13" text-anchor="middle" font-weight="bold">取引履歴リストにエントリーを記録</text>
    <text x="883" y="385" fill="#aaa" font-size="12" text-anchor="middle">エントリー価格 = df['open'].iloc[idx+1]</text>
    <text x="883" y="403" fill="#aaa" font-size="12" text-anchor="middle">ロング or ショート</text>
    <text x="883" y="418" fill="#555" font-size="11" text-anchor="middle">（df は変更しない）</text>

    <!-- 次のidxへ（下部集約） -->
    <line x1="400" y1="531" x2="400" y2="580" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="883" y1="426" x2="883" y2="580" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="400" y1="580" x2="883" y2="580" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="640" y1="580" x2="640" y2="618" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

    <rect x="510" y="618" width="260" height="44" rx="22" fill="#2a1a0a" stroke="#ff9800" stroke-width="2"/>
    <text x="640" y="645" fill="#ffcc80" font-size="14" text-anchor="middle">idx +1 して次の足へ</text>

  </svg>
</div>

<!-- ===== 役割分担 ===== -->
<div class="section">
  <h3>役割分担まとめ</h3>

  <svg viewBox="0 0 820 160" width="100%" style="font-family:sans-serif">
    <!-- カセット -->
    <rect x="10" y="20" width="370" height="120" rx="8" fill="#0d1a2a" stroke="#2196f3" stroke-width="2"/>
    <text x="195" y="50" fill="#90caf9" font-size="16" text-anchor="middle" font-weight="bold">カセット（logics/*.py）</text>
    <text x="195" y="76" fill="#eee" font-size="14" text-anchor="middle">「この足でエントリーすべきか？」</text>
    <text x="195" y="98" fill="#eee" font-size="14" text-anchor="middle">「この足で決済すべきか？」</text>
    <text x="195" y="125" fill="#4caf50" font-size="15" text-anchor="middle" font-weight="bold">→ True か False を返すだけ</text>

    <!-- 矢印 -->
    <line x1="380" y1="80" x2="430" y2="80" stroke="#555" stroke-width="2"/>
    <polygon points="433,80 423,75 423,85" fill="#555"/>
    <text x="405" y="73" fill="#777" font-size="12" text-anchor="middle">呼び出す</text>

    <!-- BacktestEngine -->
    <rect x="435" y="20" width="370" height="120" rx="8" fill="#1b3a1b" stroke="#4caf50" stroke-width="2"/>
    <text x="620" y="50" fill="#a5d6a7" font-size="16" text-anchor="middle" font-weight="bold">BacktestEngine</text>
    <text x="620" y="76" fill="#eee" font-size="14" text-anchor="middle">全行をループして聞いて回る</text>
    <text x="620" y="98" fill="#eee" font-size="14" text-anchor="middle">価格の記録・損益計算をする</text>
    <text x="620" y="125" fill="#ffcc80" font-size="14" text-anchor="middle">カセットを差し替えても本体は変わらない</text>
  </svg>
</div>

</body>
</html>
