<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FES ↔ OANDA シーケンス図</title>
</head>
<body style="background:#111; display:flex; justify-content:center; padding:30px; margin:0">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 820" width="1100" style="font-family:sans-serif">
  <rect width="760" height="820" fill="#1a1a2e"/>

  <!-- タイトル -->
  <text x="380" y="32" fill="#ccc" font-size="16" text-anchor="middle" font-weight="bold">FES ↔ OANDA API　シーケンス図（エントリー〜決済）</text>

  <!-- ヘッダーボックス -->
  <rect x="40"  y="50" width="180" height="44" rx="6" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
  <text x="130" y="68"  fill="#90caf9" font-size="13" text-anchor="middle" font-weight="bold">FES</text>
  <text x="130" y="85"  fill="#aaa"    font-size="10" text-anchor="middle">entry_logic.py</text>

  <rect x="540" y="50" width="180" height="44" rx="6" fill="#2a1a0a" stroke="#ff9800" stroke-width="2"/>
  <text x="630" y="68"  fill="#ffb74d" font-size="13" text-anchor="middle" font-weight="bold">OANDA API</text>
  <text x="630" y="85"  fill="#aaa"    font-size="10" text-anchor="middle">api-fxpractice.oanda.com</text>

  <!-- ライフライン -->
  <line x1="130" y1="94"  x2="130" y2="810" stroke="#2196f3" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="630" y1="94"  x2="630" y2="810" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ======== ① 毎時0分：起動 ======== -->
  <rect x="40" y="115" width="180" height="30" rx="4" fill="#1b3a1b"/>
  <text x="130" y="135" fill="#a5d6a7" font-size="11" text-anchor="middle">⏰ 毎時0分　タイマー発火</text>

  <!-- ======== ② データ取得リクエスト ======== -->
  <line x1="130" y1="165" x2="610" y2="165" stroke="#90caf9" stroke-width="2"/>
  <polygon points="610,165 598,160 598,170" fill="#90caf9"/>
  <text x="370" y="158" fill="#90caf9" font-size="11" text-anchor="middle">「XAU_USD の直近200本 H1 足データをくれ」</text>

  <!-- ======== ③ データ返却 ======== -->
  <line x1="150" y1="195" x2="630" y2="195" stroke="#ffb74d" stroke-width="2"/>
  <polygon points="150,195 162,190 162,200" fill="#ffb74d"/>
  <text x="370" y="188" fill="#ffb74d" font-size="11" text-anchor="middle">200本のローソク足データ（time / open / high / low / close）</text>

  <!-- ======== ④ FES内部処理 ======== -->
  <rect x="40" y="215" width="180" height="50" rx="4" fill="#1a2a3a" stroke="#555" stroke-width="1"/>
  <text x="130" y="234" fill="#eee"    font-size="11" text-anchor="middle">【内部処理】</text>
  <text x="130" y="250" fill="#90caf9" font-size="10" text-anchor="middle">heikin_ashi.py で平均足を計算</text>
  <text x="130" y="264" fill="#aaa"    font-size="10" text-anchor="middle">75SMA・傾きも計算</text>

  <!-- ======== ⑤ シグナル判定 ======== -->
  <rect x="40" y="280" width="180" height="40" rx="4" fill="#1a2a3a" stroke="#555" stroke-width="1"/>
  <text x="130" y="298" fill="#eee"    font-size="11" text-anchor="middle">【シグナル判定】</text>
  <text x="130" y="313" fill="#aaa"    font-size="10" text-anchor="middle">BUY / SELL / WAIT を決定</text>

  <!-- ======== ⑥ WAIT の場合 ======== -->
  <text x="130" y="345" fill="#777" font-size="11" text-anchor="middle">▼ WAIT の場合</text>
  <rect x="40" y="352" width="180" height="26" rx="4" fill="#222"/>
  <text x="130" y="369" fill="#666" font-size="11" text-anchor="middle">何もしない。次の時間まで待機</text>

  <!-- 区切り線 -->
  <line x1="40" y1="395" x2="720" y2="395" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="380" y="410" fill="#777" font-size="11" text-anchor="middle">▼ BUY / SELL の場合</text>

  <!-- ======== ⑦ 注文リクエスト ======== -->
  <line x1="130" y1="430" x2="610" y2="430" stroke="#90caf9" stroke-width="2"/>
  <polygon points="610,430 598,425 598,435" fill="#90caf9"/>
  <text x="370" y="423" fill="#90caf9" font-size="11" text-anchor="middle">「XAU_USD を ○ユニット 買え（または売れ）」</text>

  <!-- ======== ⑧ 約定レスポンス ======== -->
  <line x1="150" y1="460" x2="630" y2="460" stroke="#ffb74d" stroke-width="2"/>
  <polygon points="150,460 162,455 162,465" fill="#ffb74d"/>
  <text x="370" y="453" fill="#ffb74d" font-size="11" text-anchor="middle">「注文受付。約定価格 ○○」</text>

  <!-- ======== ⑨ ポジション保有中 ======== -->
  <rect x="40" y="478" width="180" height="26" rx="4" fill="#1b3a1b"/>
  <text x="130" y="495" fill="#a5d6a7" font-size="11" text-anchor="middle">ポジション保有中（次の時間へ）</text>

  <!-- 区切り線 -->
  <line x1="40" y1="520" x2="720" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="380" y="535" fill="#777" font-size="11" text-anchor="middle">▼ 次の時間足で平均足が逆転 → 決済へ</text>

  <!-- ======== ⑩ ポジション照会 ======== -->
  <line x1="130" y1="555" x2="610" y2="555" stroke="#90caf9" stroke-width="2"/>
  <polygon points="610,555 598,550 598,560" fill="#90caf9"/>
  <text x="370" y="548" fill="#90caf9" font-size="11" text-anchor="middle">「現在のポジションを教えてくれ」</text>

  <!-- ======== ⑪ ポジション返却 ======== -->
  <line x1="150" y1="585" x2="630" y2="585" stroke="#ffb74d" stroke-width="2"/>
  <polygon points="150,585 162,580 162,590" fill="#ffb74d"/>
  <text x="370" y="578" fill="#ffb74d" font-size="11" text-anchor="middle">「XAU_USD ロング ○ユニット 保有中」</text>

  <!-- ======== ⑫ 決済注文 ======== -->
  <line x1="130" y1="615" x2="610" y2="615" stroke="#90caf9" stroke-width="2"/>
  <polygon points="610,615 598,610 598,620" fill="#90caf9"/>
  <text x="370" y="608" fill="#90caf9" font-size="11" text-anchor="middle">「ポジションを全決済せよ」</text>

  <!-- ======== ⑬ 決済完了 ======== -->
  <line x1="150" y1="645" x2="630" y2="645" stroke="#ffb74d" stroke-width="2"/>
  <polygon points="150,645 162,640 162,650" fill="#ffb74d"/>
  <text x="370" y="638" fill="#ffb74d" font-size="11" text-anchor="middle">「決済完了。確定損益 ○○ドル」</text>

  <!-- ======== ⑭ 完了 ======== -->
  <rect x="40" y="663" width="180" height="26" rx="4" fill="#3a1a1a"/>
  <text x="130" y="680" fill="#ef9a9a" font-size="11" text-anchor="middle">トレード終了。次の機会を待つ</text>

  <!-- 凡例 -->
  <rect x="40" y="715" width="680" height="80" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="60" y="735" fill="#777" font-size="11">凡例：</text>
  <line x1="100" y1="750" x2="160" y2="750" stroke="#90caf9" stroke-width="2"/>
  <polygon points="160,750 148,745 148,755" fill="#90caf9"/>
  <text x="170" y="754" fill="#90caf9" font-size="11">FES → OANDA へのリクエスト</text>
  <line x1="100" y1="775" x2="160" y2="775" stroke="#ffb74d" stroke-width="2"/>
  <polygon points="100,775 112,770 112,780" fill="#ffb74d"/>
  <text x="170" y="779" fill="#ffb74d" font-size="11">OANDA → FES へのレスポンス</text>

</svg>

</body>
</html>
